spring:
  application:
    name: bizflow-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://localhost:8080"
              - "http://localhost:8000"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
              - HEAD
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      default-filters: []
      routes:
        - id: promotion-service
          uri: "http://promotion-service:8082/"
          predicates:
            - Path=/api/v1/promotions/**
        - id: auth-service
          uri: "http://authentication-service:8086/"
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/branches/**
        - id: admin-user-service
          uri: "http://admin-user-service:8201/"
          predicates:
            - Path=/api/admin/users/**,/api/admin/customers/**
        - id: admin-product-service
          uri: "http://admin-product-service:8204/"
          predicates:
            - Path=/api/admin/products,/api/admin/products/**
          filters:
            - StripPrefix=1
        - id: admin-order-service
          uri: "http://admin-order-service:8203/"
          predicates:
            - Path=/api/admin/orders,/api/admin/orders/**
          filters:
            - StripPrefix=1
        - id: admin-report-service
          uri: "http://admin-report-service:8205/"
          predicates:
            - Path=/api/admin/reports,/api/admin/reports/**
          filters:
            - StripPrefix=1
        - id: admin-home-service
          uri: "http://admin-home-service:8200/"
          predicates:
            - Path=/api/admin/dashboard/**
        - id: sales-service
          uri: "http://sales-service:8081/"
          predicates:
            - Path=/api/orders/**
        - id: warranty-service
          uri: "http://sales-service:8081/"
          predicates:
            - Path=/api/warranties/**
        - id: shipment-service
          uri: "http://sales-service:8081/"
          predicates:
            - Path=/api/shipments/**
        - id: catalog-service
          uri: "http://catalog-service:8083/"
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/product-costs/**,/api/product-images/**
        - id: inventory-service
          uri: "http://inventory-service:8084/"
          predicates:
            - Path=/api/inventory/**
        - id: customer-service
          uri: "http://customer-service:8085/"
          predicates:
            - Path=/api/customers/**,/api/messages/**,/api/conversations/**
        - id: report-service
          uri: "http://report-service:8087/"
          predicates:
            - Path=/api/reports/**,/api/dashboard/**
        - id: ai-service
          uri: "http://ai-service:5000/"
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1

server:
  port: 8000
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.example.gateway: DEBUG
