<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Login API</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; font-size: 16px; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test Login AdminUserService</h1>
    <p><strong>Endpoint:</strong> http://localhost:8201/admin/users/login</p>
    
    <div>
        <label>Username:</label><br>
        <input type="text" id="username" value="admin" style="width: 300px;">
    </div>
    
    <div>
        <label>Password:</label><br>
        <input type="password" id="password" value="password" style="width: 300px;">
    </div>
    
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testHealth()">Test Health</button>
    
    <div id="result"></div>

    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.textContent = 'Calling API...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('http://localhost:8201/admin/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✓ LOGIN SUCCESS!\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '✗ LOGIN FAILED!\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '✗ ERROR!\n\n' + error.message + '\n\nMake sure AdminUserService is running on port 8201';
            }
        }
        
        async function testHealth() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Checking health...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('http://localhost:8201/admin/users/health');
                const data = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.textContent = '✓ SERVICE HEALTHY!\n\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '✗ SERVICE DOWN!\n\n' + error.message;
            }
        }
    </script>
</body>
</html>
