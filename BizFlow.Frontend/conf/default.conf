# Nginx config: serve static and proxy /api to backend
server {
    listen 80;
    server_name _;

    # Proxy API calls to backend service name in Docker network
    # Proxy API calls through Gateway
    # Use Docker DNS resolver so upstream re-resolves if gateway container IP changes
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream http://gateway:8000;
    location /api/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 5;
        proxy_next_upstream_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy AI service calls through Gateway
    location /ai/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 5;
        proxy_next_upstream_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    root /usr/share/nginx/html;
    # Serve login page as default
    index pages/login.html;

    location / {
        # Allow accessing pages directly at root (e.g. /admin-home.html) by
        # looking under /pages as a fallback before redirecting to login.
        try_files $uri $uri/ /pages$uri /pages/login.html;
    }
}
