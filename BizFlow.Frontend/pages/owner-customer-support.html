<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizFlow - Chăm sóc khách hàng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2f3a8f;
      --primary-dark: #1f2a66;
      --highlight: #7dd3fc;
      --bg: #f3f4f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, var(--primary-dark), var(--primary));
      color: #e5e7eb;
      padding: 18px 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 14px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
    }

    .brand-name { font-weight: 700; }
    .brand-sub { font-size: 12px; color: #c7d2fe; }

    .nav {
      display: flex;
      flex-direction: column;
      padding: 8px 0;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      margin: 0 10px;
      border-radius: 10px;
      color: #e5e7eb;
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .nav-item:hover { background: rgba(255,255,255,0.06); }

    .nav-item.active {
      background: rgba(255,255,255,0.1);
      border-left-color: var(--highlight);
      color: #fff;
    }

    .nav-item .icon { width: 18px; text-align: center; }

    .content {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
    }

    .owner-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      padding: 8px 14px;
      font-weight: 600;
    }

    .chat-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      min-height: calc(100vh - 140px);
    }

    .conversation-list {
      border: 1px solid #dbe4f3;
      border-radius: 12px;
      overflow: auto;
      background: #fff;
    }

    .conv-item {
      width: 100%;
      border: none;
      border-bottom: 1px solid #eef2fb;
      background: #fff;
      text-align: left;
      padding: 12px;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .conv-item:hover { background: #f8faff; }
    .conv-item.active { background: #e8f2ff; }
    .conv-item small { color: var(--muted); }

    .conv-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .conv-pending {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecdd3;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      line-height: 1.2;
    }

    .chat-box {
      border: 1px solid #dbe4f3;
      border-radius: 12px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      background: #fff;
    }

    .chat-head {
      padding: 12px;
      border-bottom: 1px solid #e8eef8;
      font-weight: 700;
    }

    .chat-messages {
      padding: 12px;
      overflow: auto;
      display: grid;
      gap: 8px;
      background: #f8fbff;
    }

    .msg {
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 10px;
      display: grid;
      gap: 2px;
      font-size: 13px;
    }

    .msg.owner {
      justify-self: end;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
    }

    .msg.user {
      justify-self: start;
      background: #fff;
      border: 1px solid #dce5f5;
    }

    .msg .sender {
      font-size: 11px;
      opacity: 0.8;
      font-weight: 600;
    }

    .msg .time {
      font-size: 10px;
      opacity: 0.7;
    }

    .chat-input {
      border-top: 1px solid #e8eef8;
      padding: 10px;
      display: flex;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #cfd9ee;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
    }

    .chat-input button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: var(--primary-dark);
    }

    @media (max-width: 1100px) {
      .chat-wrapper {
        grid-template-columns: 1fr;
        min-height: auto;
      }
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">BF</div>
      <div>
        <div class="brand-name">BizFlow</div>
        <div class="brand-sub">Owner Center</div>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="owner-dashboard.html"><span class="icon">🏠</span><span>Tổng quan</span></a>
      <a class="nav-item" href="owner-reports.html"><span class="icon">📈</span><span>Báo cáo doanh thu</span></a>
      <a class="nav-item" href="owner-products.html"><span class="icon">📦</span><span>Sản phẩm</span></a>
      <a class="nav-item" href="owner-categories.html"><span class="icon">🗂️</span><span>Danh mục</span></a>
      <a class="nav-item" href="owner-inventory.html"><span class="icon">🏬</span><span>Quản lý kho</span></a>
      <a class="nav-item" href="owner-purchase.html"><span class="icon">🛒</span><span>Nhập hàng và giá vốn</span></a>
      <a class="nav-item" href="owner-users.html"><span class="icon">👥</span><span>Quản lý nhân viên</span></a>
      <a class="nav-item" href="owner-promotions.html"><span class="icon">🎯</span><span>Khuyến mãi</span></a>
      <a class="nav-item active" href="owner-customer-support.html"><span class="icon">📞</span><span>Chăm sóc khách hàng</span></a>
      <a class="nav-item" href="owner-inventory-alerts.html"><span class="icon">🔔</span><span>Thông báo tồn kho</span></a>
      <a class="nav-item" href="display-settings.html"><span class="icon">⚙️</span><span>Thiết lập</span></a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 class="page-title">Chăm sóc khách hàng</h1>
      <div class="owner-chip" id="ownerLabel">Owner</div>
    </div>

    <section class="chat-wrapper">
      <div class="conversation-list" id="conversationList"></div>
      <div class="chat-box">
        <div class="chat-head" id="chatHead">Chọn khách hàng để bắt đầu trả lời</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Nhập phản hồi cho khách hàng..." />
          <button id="sendBtn" type="button">Gửi</button>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const API_BASE = (() => {
  if (window.API_BASE_URL || window.API_BASE) return window.API_BASE_URL || window.API_BASE;
  if (["localhost", "127.0.0.1"].includes(window.location.hostname) && window.location.port !== "8080") return "http://localhost:8000/api";
  return `${window.location.origin}/api`;
})();

let ownerId = Number(sessionStorage.getItem('userId')) || null;
let ownerName = sessionStorage.getItem('username') || 'Owner';
let activeUserId = null;
let activeUserName = null;
let pollTimer = null;
const userNameById = new Map();

document.getElementById('ownerLabel').textContent = ownerName;
document.getElementById('sendBtn').addEventListener('click', sendReply);
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendReply();
  }
});

function formatTime(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function escapeAttr(value) {
  return String(value || '').replace(/"/g, '&quot;');
}

function resolveCustomerDisplayName(rawName, userId) {
  const clean = (rawName || '').trim();
  const looksGeneric = !clean
    || clean.toLowerCase() === 'nguoi dung'
    || clean.toLowerCase() === 'người dùng'
    || /^user\s*#\d+$/i.test(clean)
    || /^khach\s*hang\s*#\d+$/i.test(clean)
    || /^khách\s*hàng\s*#\d+$/i.test(clean);

  if (!looksGeneric) return clean;

  const id = Number(userId);
  if (Number.isFinite(id) && userNameById.has(id)) {
    return userNameById.get(id);
  }

  return Number.isFinite(id) ? `Khách hàng #${id}` : 'Khách hàng';
}

async function ensureUserDirectory() {
  if (userNameById.size > 0) return;

  const token = sessionStorage.getItem('accessToken') || '';
  const res = await fetch(`${API_BASE}/users`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });

  if (!res.ok) return;
  const rows = await res.json();

  (rows || []).forEach((u) => {
    const id = Number(u?.id);
    if (!Number.isFinite(id)) return;
    const fullName = String(u?.fullName || '').trim();
    const username = String(u?.username || '').trim();
    if (fullName) {
      userNameById.set(id, fullName);
    } else if (username) {
      userNameById.set(id, username);
    }
  });
}

async function loadConversations() {
  if (!ownerId) return;
  await ensureUserDirectory();

  const res = await fetch(`${API_BASE}/conversations?ownerId=${ownerId}`, {
    headers: { 'Authorization': `Bearer ${sessionStorage.getItem('accessToken') || ''}` }
  });
  if (!res.ok) return;
  const rows = await res.json();
  const list = document.getElementById('conversationList');

  if (!rows || rows.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:#6b7280;">Chưa có liên hệ nào.</div>';
    return;
  }

  list.innerHTML = rows.map(item => {
    const displayName = resolveCustomerDisplayName(item.userName, item.userId);
    const hasUnread = Number(item.unreadCount) > 0;
    return `
    <button class="conv-item ${Number(item.userId) === Number(activeUserId) ? 'active' : ''}" type="button" data-user-id="${item.userId}" data-user-name="${escapeAttr(displayName)}">
      <div class="conv-title">
        <strong>${displayName.replace(/</g,'&lt;')}</strong>
        ${hasUnread ? '<span class="conv-pending">chờ phản hồi</span>' : ''}
      </div>
      <span>${(item.lastMessage || '').replace(/</g,'&lt;')}</span>
      <small>${formatTime(item.lastMessageAt)} ${hasUnread ? `<strong style="color:#ef4444;margin-left:4px;">(${item.unreadCount})</strong>` : ''}</small>
    </button>
  `;
  }).join('');

  list.querySelectorAll('.conv-item').forEach(btn => {
    btn.addEventListener('click', async () => {
      activeUserName = btn.dataset.userName || ('User #' + activeUserId);
      activeUserId = Number(btn.dataset.userId);
      await loadConversations();
      await loadThread();
    });
  });

  if (!activeUserId && rows[0]) {
    activeUserId = Number(rows[0].userId);
    activeUserName = resolveCustomerDisplayName(rows[0].userName, rows[0].userId);
    await loadConversations();
    await loadThread();
  }
}

function renderThread(rows) {
  const box = document.getElementById('chatMessages');
  box.innerHTML = (rows || []).map(m => {
    const isOwner = Number(m.senderId) === Number(ownerId);
    const sender = isOwner
      ? (m.senderName || ownerName)
      : resolveCustomerDisplayName(m.senderName, m.senderId);
    return `
      <div class="msg ${isOwner ? 'owner' : 'user'}">
        <div class="sender">${sender.replace(/</g,'&lt;')}</div>
        <div>${(m.content || '').replace(/</g,'&lt;')}</div>
        <div class="time">${formatTime(m.createdAt)}</div>
      </div>
    `;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

async function loadThread() {
  if (!activeUserId || !ownerId) return;
  const displayName = activeUserName || ('User #' + activeUserId);
  document.getElementById('chatHead').textContent = `Đang trò chuyện với ${displayName}`;

  const res = await fetch(`${API_BASE}/messages/${activeUserId}/${ownerId}`, {
    headers: { 'Authorization': `Bearer ${sessionStorage.getItem('accessToken') || ''}` }
  });
  if (!res.ok) return;
  const rows = await res.json();
  renderThread(rows);
}

async function sendReply() {
  const input = document.getElementById('chatInput');
  const content = (input.value || '').trim();
  if (!content || !activeUserId || !ownerId) return;

  const res = await fetch(`${API_BASE}/messages`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${sessionStorage.getItem('accessToken') || ''}`
    },
    body: JSON.stringify({
      senderId: ownerId,
      receiverId: activeUserId,
      senderName: ownerName,
      receiverName: activeUserName || ('User #' + activeUserId),
      content
    })
  });

  if (!res.ok) return;
  input.value = '';
  await loadThread();
  await loadConversations();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    await loadConversations();
    await loadThread();
  }, 5000);
}

(async function init() {
  await loadConversations();
  startPolling();
})();
</script>
</body>
</html>
