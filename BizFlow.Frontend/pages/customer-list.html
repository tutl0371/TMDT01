<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng - BizFlow</title>
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/customer-list.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quản lý khách hàng</h1>
            <button class="primary-btn" onclick="openAddCustomerModal()">+ Thêm khách hàng</button>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên, số điện thoại, mã khách hàng...">
                <button class="search-btn" onclick="searchCustomers()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"/>
                        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="filter-section">
                <select id="tierFilter" onchange="filterCustomers()">
                    <option value="">Tất cả hạng thẻ</option>
                    <option value="DONG">Member</option>
                    <option value="BAC">Silver</option>
                    <option value="VANG">Gold</option>
                    <option value="BACH_KIM">Platinum</option>
                    <option value="KIM_CUONG">Diamond</option>
                </select>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-label">Tổng khách hàng</div>
                <div class="stat-value" id="totalCustomers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Khách hàng mới (tháng)</div>
                <div class="stat-value" id="newCustomers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Khách VIP</div>
                <div class="stat-value" id="vipCustomers">0</div>
            </div>
        </div>

        <div class="table-container">
            <table class="customers-table">
                <thead>
                    <tr>
                        <th>Mã KH</th>
                        <th>Tên khách hàng</th>
                        <th>Số điện thoại</th>
                        <th>Email</th>
                        <th>Hạng thẻ</th>
                        <th>Tổng điểm</th>
                        <th>Địa chỉ</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <tr class="empty-row">
                        <td colspan="8">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="paginationControls" style="display: none;">
            <button class="page-btn" id="prevPage" onclick="changePage(-1)">‹</button>
            <span id="pageInfo">1/1 kết quả</span>
            <button class="page-btn" id="nextPage" onclick="changePage(1)">›</button>
        </div>
    </div>

    <script src="../assets/js/customer-list.js"></script>
</body>
</html>
